<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Controle">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="img/icon-192.png">

  <title>Acessórios</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.28)), url("img/logoadidas.png") center / cover fixed no-repeat; background-color: #f4f4f4; color: #1e1e1e; padding: 14px; max-width: 1100px; margin: 0 auto; }
    h1 { margin-bottom: 16px; font-size: clamp(1.4rem, 5vw, 2rem); }
    .input-area { margin-bottom: 18px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 12px; }
    .input-area label { font-weight: bold; }
    input, button, textarea, select { padding: 10px 12px; font-size: 15px; }
    input[type="text"], select { flex: 1 1 220px; min-height: 42px; border: 1px solid #ccc; border-radius: 8px; background: #fff; }
    #codigo { flex: 0 0 180px; max-width: 180px; text-transform: uppercase; }
    button { margin-left: 0; cursor: pointer; min-height: 44px; border: none; border-radius: 8px; background: #0f766e; color: #fff; font-weight: bold; }
    .produto { background: #fff; border: 1px solid #d7d7d7; border-radius: 12px; padding: 14px; margin-bottom: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .categorias { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-top: 10px; }
    .categoria { display: flex; flex-direction: column; align-items: center; border: 1px solid #ececec; border-radius: 10px; padding: 8px; background: #fafafa; }
    .campo-quantidade { display: flex; flex-direction: column; align-items: center; }
    .campo-titulo { font-size: 12px; font-weight: bold; color: #333; margin-top: 6px; }
    .number-stepper { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
    .categoria input { width: 62px; height: 36px; text-align: center; border: 2px solid #ccc; border-radius: 6px; }
    .step-btn { width: 36px; height: 36px; border: 1px solid #aaa; border-radius: 8px; background: #fff; cursor: pointer; margin-left: 0; padding: 0; font-size: 20px; line-height: 1; color: #222; }
    .categoria input.faltando { border-color: #e11d48; background: #ffe5e5; }
    textarea { width: 100%; min-height: 90px; margin-top: 10px; resize: vertical; border: 1px solid #ccc; border-radius: 8px; }
    #finalizados { margin-top: 24px; padding: 12px; background: #e8ffe8; border: 2px solid #4CAF50; border-radius: 10px; }
    .back-link { display: inline-flex; min-height: 42px; align-items: center; justify-content: center; padding: 8px 12px; border-radius: 8px; text-decoration: none; background: #1d4ed8; color: #fff; font-weight: bold; margin-bottom: 12px; }
    .toggle-finalizados { width: 100%; background: #2e7d32; }
    #listaFinalizadosWrapper { margin-top: 10px; display: none; }
    .finalizado-item { background: #fff; border: 1px solid #c6e6c8; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .finalizado-item summary { padding: 10px 12px; cursor: pointer; font-weight: bold; }
    .finalizado-item .produto { margin: 0; border: none; border-top: 1px solid #ececec; border-radius: 0; box-shadow: none; }

    @media (max-width: 700px) {
      body { padding: 10px; }
      .input-area { flex-direction: column; align-items: stretch; }
      .input-area button { width: 100%; }
      #codigo { max-width: 100%; }
      .categorias { grid-template-columns: 1fr; }
      .step-btn { width: 40px; height: 40px; }
      .categoria input { width: 64px; height: 40px; }
    }
  </style>
</head>
<body>
  <a class="back-link" href="dashboard.html">&#8592; Voltar ao Dashboard</a>
  <h1>&#128717; Controle de Acessórios</h1>
  <div class="input-area">
    <label for="codigo">Código do Produto:</label>
    <input type="text" id="codigo" placeholder="Digite o código">
    
    <label for="tipo">Tipo de Acessório:</label>
    <select id="tipo">
      <option value="Boné">Boné</option>
      <option value="Meia">Meia</option>
      <option value="Bolsa">Bolsa</option>
      <option value="Sunga">Sunga</option>
      <option value="Mochila">Mochila</option>
    </select>

    <button onclick="adicionarProduto()">Adicionar</button>
  </div>

  <div id="listaProdutos"></div>

  <div id="finalizados">
    <button type="button" id="toggleFinalizados" class="toggle-finalizados" onclick="alternarFinalizados()">Produtos Finalizados (0)</button>
    <div id="listaFinalizadosWrapper">
      <div id="listaFinalizados"></div>
    </div>
  </div>

  <script src="auth-db.js"></script>
  <script>
    AuthDB.exigirLogin();
    const STORAGE_KEY = "controle_acessorios_state_v1";

    function normalizarCodigo(valor) {
      return (valor || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
    }

    function configurarCampoCodigo() {
      const campoCodigo = document.getElementById("codigo");
      campoCodigo.addEventListener("input", () => {
        campoCodigo.value = normalizarCodigo(campoCodigo.value);
        salvarEstado();
      });
    }

    function criarControleNumero(placeholder) {
      const container = document.createElement("div");
      container.className = "campo-quantidade";

      const titulo = document.createElement("span");
      titulo.className = "campo-titulo";
      titulo.textContent = placeholder;

      const wrapper = document.createElement("div");
      wrapper.className = "number-stepper";

      const menos = document.createElement("button");
      menos.type = "button";
      menos.className = "step-btn";
      menos.textContent = "-";
      menos.dataset.delta = "-1";

      const input = document.createElement("input");
      input.type = "number";
      input.min = "0";
      input.value = "0";
      input.placeholder = placeholder;
      input.dataset.campo = placeholder === "Seção" ? "secao" : "estoque";

      if (input.dataset.campo === "secao") {
        input.classList.add("faltando");
      }

      const mais = document.createElement("button");
      mais.type = "button";
      mais.className = "step-btn";
      mais.textContent = "+";
      mais.dataset.delta = "1";

      wrapper.appendChild(menos);
      wrapper.appendChild(input);
      wrapper.appendChild(mais);

      container.appendChild(titulo);
      container.appendChild(wrapper);

      return { wrapper: container, input };
    }

    function adicionarProduto() {
      const campoCodigo = document.getElementById("codigo");
      const codigo = normalizarCodigo(campoCodigo.value.trim());
      const tipo = document.getElementById("tipo").value;
      if (codigo === "") return;

      const lista = document.getElementById("listaProdutos");
      const produtoDiv = document.createElement("div");
      produtoDiv.className = "produto";
      produtoDiv.innerHTML = `<h3>Acessório código: ${codigo}</h3><p>Organizando: <strong>${tipo}</strong></p>`;

      const categoriasDiv = document.createElement("div");
      categoriasDiv.className = "categorias";

      const bloco = document.createElement("div");
      bloco.className = "categoria";

      const controleSecao = criarControleNumero("Seção");
      const controleEstoque = criarControleNumero("Estoque");

      bloco.innerHTML = `<span>${tipo}</span>`;
      bloco.appendChild(controleSecao.wrapper);
      bloco.appendChild(controleEstoque.wrapper);
      categoriasDiv.appendChild(bloco);

      produtoDiv.appendChild(categoriasDiv);

      const obs = document.createElement("textarea");
      obs.placeholder = "Observações...";
      produtoDiv.appendChild(obs);

      // Caixinha de confirmação
      const confirmacao = document.createElement("div");
      confirmacao.innerHTML = `<label><input type="checkbox"> Confirmar OK</label>`;
      produtoDiv.appendChild(confirmacao);

      lista.prepend(produtoDiv);
      campoCodigo.value = "";
      salvarEstado();
    }

    function atualizarContadorFinalizados() {
      const total = document.querySelectorAll("#listaFinalizados .finalizado-item").length;
      const botao = document.getElementById("toggleFinalizados");
      botao.textContent = `Produtos Finalizados (${total})`;
    }

    function alternarFinalizados() {
      const wrapper = document.getElementById("listaFinalizadosWrapper");
      wrapper.style.display = wrapper.style.display === "none" ? "block" : "none";
      salvarEstado();
    }

    function moverParaFinalizados(produtoDiv) {
      const confirmacao = produtoDiv.lastElementChild;
      if (confirmacao) {
        confirmacao.remove();
      }

      const tituloProduto = produtoDiv.querySelector("h3") ? produtoDiv.querySelector("h3").textContent : "Produto finalizado";
      const itemFinalizado = document.createElement("details");
      itemFinalizado.className = "finalizado-item";

      const resumo = document.createElement("summary");
      resumo.textContent = tituloProduto;

      itemFinalizado.appendChild(resumo);
      itemFinalizado.appendChild(produtoDiv);

      const listaFinalizados = document.getElementById("listaFinalizados");
      listaFinalizados.prepend(itemFinalizado);
      atualizarContadorFinalizados();
      salvarEstado();
    }

    function atualizarDestaqueSecao(inputSecao) {
      if (inputSecao.value === "" || inputSecao.value === "0") {
        inputSecao.classList.add("faltando");
      } else {
        inputSecao.classList.remove("faltando");
      }
    }

    function salvarEstado() {
      const estado = {
        listaProdutosHTML: document.getElementById("listaProdutos").innerHTML,
        listaFinalizadosHTML: document.getElementById("listaFinalizados").innerHTML,
        finalizadosAberto: document.getElementById("listaFinalizadosWrapper").style.display === "block"
      };

      localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
    }

    function carregarEstado() {
      const texto = localStorage.getItem(STORAGE_KEY);
      if (!texto) {
        atualizarContadorFinalizados();
        return;
      }

      try {
        const estado = JSON.parse(texto);
        document.getElementById("listaProdutos").innerHTML = estado.listaProdutosHTML || "";
        document.getElementById("listaFinalizados").innerHTML = estado.listaFinalizadosHTML || "";

        if (estado.finalizadosAberto) {
          document.getElementById("listaFinalizadosWrapper").style.display = "block";
        }

        document.querySelectorAll('input[data-campo="secao"]').forEach(atualizarDestaqueSecao);
      } catch (_erro) {
        localStorage.removeItem(STORAGE_KEY);
      }

      atualizarContadorFinalizados();
    }

    document.addEventListener("click", (event) => {
      const stepBtn = event.target.closest(".step-btn");
      if (!stepBtn) {
        return;
      }

      const campo = stepBtn.parentElement ? stepBtn.parentElement.querySelector('input[type="number"]') : null;
      if (!campo) {
        return;
      }

      const delta = parseInt(stepBtn.dataset.delta || "0", 10);
      if (Number.isNaN(delta)) {
        return;
      }

      const valorAtual = parseInt(campo.value, 10);
      const base = Number.isNaN(valorAtual) ? 0 : valorAtual;
      campo.value = String(Math.max(0, base + delta));
      campo.dispatchEvent(new Event("input", { bubbles: true }));
    });

    document.addEventListener("input", (event) => {
      const alvo = event.target;

      if (alvo.id === "codigo") {
        alvo.value = normalizarCodigo(alvo.value);
      }

      if (alvo.matches('input[data-campo="secao"]')) {
        atualizarDestaqueSecao(alvo);
      }

      if (alvo.closest(".produto") || alvo.id === "tipo") {
        salvarEstado();
      }
    });

    document.addEventListener("change", (event) => {
      const checkbox = event.target;
      if (!checkbox.matches('.produto input[type="checkbox"]')) {
        return;
      }

      if (checkbox.checked) {
        const produto = checkbox.closest(".produto");
        if (produto) {
          moverParaFinalizados(produto);
        }
      }
    });

    configurarCampoCodigo();
    carregarEstado();
  </script>
</body>
</html>
